<form [formGroup]="form" (submit)="login()">
    <div>
        <label for="username"> Username: </label>
        <input type="text" formControlName="username" name="username"/>
    </div>
    <div>
        <label for="password"> Password: </label>
        <input type="password" formControlName="password" name="password"/>
    </div>
    @if(loginWarning()){
        <div class="error">Login failed, check credentials and try again</div>
    }
    <div>
        <button>Login</button>
    </div>
</form>
