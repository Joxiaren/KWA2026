<div id="app">
    <div class="tab">
        <h2> Klijenti </h2>
        <app-klijent-form [editItem]="klijentControl.itemEdit()" (addEmit)="klijentControl.addItem($event)" (editEmit)="klijentControl.editItem($event)"></app-klijent-form>
        <app-klijent-tabela [items]="klijentControl.items" (deleteEmit)="klijentControl.deleteItem($event)" (editEmit)="klijentControl.setEditItem($event)"></app-klijent-tabela>
    </div>
    
    <div class="tab">
        <h2> Racuni </h2>
        <app-racun-form [editItem]="racunControl.itemEdit()" (addEmit)="racunControl.addItem($event)" (editEmit)="racunControl.editItem($event)"></app-racun-form>
        <app-racun-tabela [items]="racunControl.items" (deleteEmit)="racunControl.deleteItem($event)" (editEmit)="racunControl.setEditItem($event)"></app-racun-tabela>
    </div>
    
    <div class="tab">
        <h2> Transakcije </h2>
        <app-transakcija-form [editItem]="transakcijaControl.itemEdit()" [klijenti]="klijentControl.items()" [racuni]="racunControl.items()" (addEmit)="transakcijaControl.addItem($event)" (editEmit)="transakcijaControl.editItem($event)"></app-transakcija-form>
        <app-transakcija-tabela [items]="transakcijaControl.items" (deleteEmit)="transakcijaControl.deleteItem($event)" (editEmit)="transakcijaControl.setEditItem($event)"></app-transakcija-tabela>
    </div>
</div>
